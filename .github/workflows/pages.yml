name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "packages/**"
      - "proof/stripe-payment-link.json"
      - "proof/installer-download.json"
      - "deploy/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build core
        run: npm run build:core
      - name: Build site (production apex)
        run: npm run build -w @daybreak/site
      - name: Add Pages custom domain
        run: cp deploy/CNAME site/out/CNAME
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
