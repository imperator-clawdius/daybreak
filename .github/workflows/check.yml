name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=moderate
      - run: npm run check
      - run: npm run verify:local-only
      - run: npm run verify:readiness -- --allow-pending
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run verify:launch
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run verify:pages-health
        env:
          GH_TOKEN: ${{ github.token }}
